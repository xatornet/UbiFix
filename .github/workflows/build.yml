name: Build GhostReconFS-PathFix ASI

on:
  push:
    branches: [ "main", "master" ]
    tags:     [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:   # manual trigger from GitHub UI

jobs:
  build:
    name: Build (x86 / Release)
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. Set up MSVC (Visual Studio Build Tools) ─────────────────────────
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86          # ← 32-bit toolchain

      # ── 3. Configure CMake for Win32 (x86) ────────────────────────────────
      - name: Configure CMake
        run: |
          cmake -B build `
                -G "Visual Studio 17 2022" `
                -A Win32 `
                -DCMAKE_BUILD_TYPE=Release

      # ── 4. Build ───────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release

      # ── 5. Collect artefacts ───────────────────────────────────────────────
      - name: Collect output files
        run: |
          mkdir dist
          copy build\Release\GhostReconFS-PathFix.asi dist\
          copy GhostReconFS-PathFix.ini               dist\
          # Create a simple README for the zip
          echo "Installation" > dist\INSTALL.txt
          echo "1. Copy GhostReconFS-PathFix.asi and GhostReconFS-PathFix.ini into your Ghost Recon Future Soldier folder (where GRFSGame.exe lives)." >> dist\INSTALL.txt
          echo "2. You also need an ASI Loader (e.g. Ultimate ASI Loader - dsound.dll) in the same folder." >> dist\INSTALL.txt
          echo "3. Launch the game normally." >> dist\INSTALL.txt
          echo "4. To enable debug logging, set DebugMode=1 in the .ini file." >> dist\INSTALL.txt
        shell: cmd

      # ── 6. Upload as GitHub Actions artefact ──────────────────────────────
      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: GhostReconFS-PathFix
          path: dist\
          retention-days: 30

      # ── 7. Create a GitHub Release (only on version tags) ─────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/GhostReconFS-PathFix.asi
            dist/GhostReconFS-PathFix.ini
            dist/INSTALL.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

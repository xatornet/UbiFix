name: Compilar Plugin ASI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v3

    - name: Configurar MSVC (Microsoft Visual C++)
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configurar CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

    - name: Compilar el proyecto
      run: cmake --build build --config Release

    - name: Subir el archivo .asi como artefacto
      uses: actions/upload-artifact@v3
      with:
        name: PathFix-Plugin
        path: build/Release/PathFix.asi

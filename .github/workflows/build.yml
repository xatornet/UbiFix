name: Compilar Plugin ASI (32-bit)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86 # <--- ESTO FUERZA LA ARQUITECTURA 32 BITS

    - name: Configurar CMake
      # Añadimos -A Win32 para asegurar la arquitectura
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -A Win32

    - name: Compilar el proyecto
      run: cmake --build build --config Release

    - name: Subir el archivo .asi
      uses: actions/upload-artifact@v4
      with:
        name: PathFix-32bit
        path: build/Release/PathFix.asi

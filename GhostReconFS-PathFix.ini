; ──────────────────────────────────────────────────────────────
;  GhostReconFS-PathFix  –  Configuration file
; ──────────────────────────────────────────────────────────────
;
;  Place this file in the same folder as GRFSGame.exe
;
; ──────────────────────────────────────────────────────────────

[Settings]

; DebugMode
;   1 → logs only paths that get patched
;   0 → silent
;
DebugMode=0

; TraceMode
;   1 → logs EVERY path the game requests via any hooked API.
;       Use this when the game still crashes and you need to find
;       which path it's looking for. The log will be large.
;       Disable for normal play — it has a performance cost.
;   0 → off
;
TraceMode=0

; HardcodedPath
;   If TraceMode reveals the game always looks for a path that does NOT
;   match your real install directory structure (e.g. always looks in
;   "C:\Program Files (x86)\Ubisoft\Ghost Recon Future Soldier" regardless
;   of where it's actually installed), set that C:\ path here.
;   The plugin will replace this exact prefix with your real install path.
;
;   Example:
;     HardcodedPath=C:\Program Files (x86)\Ubisoft\Ghost Recon Future Soldier
;
;   Leave blank to use auto-detection (same directory structure, different drive).
;
HardcodedPath=
